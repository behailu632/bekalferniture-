<!-- HOME -->
<section id="መእተዊ">
    <h2>እንቋዕ ናብ በቃል ፈርኒቸር ብደሓን መጻእኩም ።</h2>

    <h2>ምህርቲታትና </h2>

    <div class="service-container">
       
        <div class="card በቃልፈርኒቸር">
            <img src="images/በቃልፈርኒቸር.jpg" onclick="openImage(this)">
            <h3>በቃልፈርኒቸር</h3>
            
        </div>

        <div class="card ቁምሳጥን">
            <img src="images/ቁምሳጥን.jpg" onclick="openImage(this)">
            <h3>ቁምሳጥን</h3>
           
        </div>

        <div class="card ኣልጋ">
            <img src="images/ኣልጋ.jpg" onclick="openImage(this)">
            <h3>ኣልጋ</h3>

        <div class="card መመገቢ">

            <h3>መመገቢ ጠረጴዛ</h3>
            
        </div>

        <div class="card ሶፋ">
            <img src="images/ሶፋ.jpg" onclick="openImage(this)">
            <h3>ሶፋ</h3>
            
        </div>

        <div class="card ወንበር">
            <img src="images/ወንበር.jpg" onclick="openImage(this)">
            <h3>ወንበር</h3>
          
        </div>

        <div class="card ቦፌ">
            <img src="images/ቦፌ.jpg" onclick="openImage(this)">
            <h3>ቦፌ</h3>
            
        </div>

    </div>
</section>

<!-- IMAGE POPUP -->
<div id="popup" onclick="closeImage()">
    <img id="popup-img">
</div>

<!-- ADDRESS -->
<section id="ኣድራሻ">
    <h2>ኣድራሻና</h2>
    <p>ፊት ንፊት ስታዲየም መኾኒ ንኣንፈት ሰሜን </p>

    <p>ሞባይል : +251 943 6080 00</p>
